services:
  init:
    image: hyperledger/besu:26.2.0
    container_name: besu-init
    user: "0:0"
    working_dir: /work
    entrypoint: ["/bin/sh", "/scripts/init-network.sh"]
    volumes:
      - ./config:/config
      - ./scripts:/scripts
      - ./network:/network

  validator1:
    networks:
      besu-net:
        ipv4_address: 172.28.1.11
    image: hyperledger/besu:26.2.0
    container_name: besu-validator1
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303/tcp"
      - "30303:30303/udp"
    volumes:
      - ./network/validator1/data:/data
    command:
      - --data-path=/data
      - --genesis-file=/data/genesis.json
      - --node-private-key-file=/data/key
      - --p2p-host=172.28.1.11
      - --p2p-port=30303
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,ADMIN,QBFT,TXPOOL
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,WEB3,ADMIN,QBFT,TXPOOL
      - --host-allowlist=*
      - --rpc-http-cors-origins=all
      - --nat-method=DOCKER
      - --metrics-enabled=true
      - --metrics-host=0.0.0.0
      - --metrics-port=9545
      - --sync-min-peers=3
    healthcheck:
      test: >
        wget -qO- --post-data='{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
        --header='Content-Type: application/json'
        http://127.0.0.1:8545 >/dev/null 2>&1 || exit 1      
      interval: 20s
      timeout: 10s
      retries: 10

  validator2:
    networks:
      besu-net:
        ipv4_address: 172.28.1.12
    image: hyperledger/besu:26.2.0
    container_name: besu-validator2
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "8547:8545"
      - "8548:8546"
      - "30304:30303/tcp"
      - "30304:30303/udp"
    volumes:
      - ./network/validator2/data:/data
    command:
      - --data-path=/data
      - --genesis-file=/data/genesis.json
      - --node-private-key-file=/data/key
      - --p2p-host=172.28.1.12
      - --p2p-port=30303
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,ADMIN,QBFT,TXPOOL
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,WEB3,ADMIN,QBFT,TXPOOL
      - --host-allowlist=*
      - --rpc-http-cors-origins=all
      - --nat-method=DOCKER
      - --metrics-enabled=true
      - --metrics-host=0.0.0.0
      - --metrics-port=9545
      - --sync-min-peers=3

  validator3:
    networks:
      besu-net:
        ipv4_address: 172.28.1.13
    image: hyperledger/besu:26.2.0
    container_name: besu-validator3
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "8549:8545"
      - "8550:8546"
      - "30305:30303/tcp"
      - "30305:30303/udp"
    volumes:
      - ./network/validator3/data:/data
    command:
      - --data-path=/data
      - --genesis-file=/data/genesis.json
      - --node-private-key-file=/data/key
      - --p2p-host=172.28.1.13
      - --p2p-port=30303
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,ADMIN,QBFT,TXPOOL
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,WEB3,ADMIN,QBFT,TXPOOL
      - --host-allowlist=*
      - --rpc-http-cors-origins=all
      - --nat-method=DOCKER
      - --metrics-enabled=true
      - --metrics-host=0.0.0.0
      - --metrics-port=9545
      - --sync-min-peers=3

  validator4:
    networks:
      besu-net:
        ipv4_address: 172.28.1.14
    image: hyperledger/besu:26.2.0
    container_name: besu-validator4
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "8551:8545"
      - "8552:8546"
      - "30306:30303/tcp"
      - "30306:30303/udp"
    volumes:
      - ./network/validator4/data:/data
    command:
      - --data-path=/data
      - --genesis-file=/data/genesis.json
      - --node-private-key-file=/data/key
      - --p2p-host=172.28.1.14
      - --p2p-port=30303
      - --rpc-http-enabled=true
      - --rpc-http-host=0.0.0.0
      - --rpc-http-port=8545
      - --rpc-http-api=ETH,NET,WEB3,ADMIN,QBFT,TXPOOL
      - --rpc-ws-enabled=true
      - --rpc-ws-host=0.0.0.0
      - --rpc-ws-port=8546
      - --rpc-ws-api=ETH,NET,WEB3,ADMIN,QBFT,TXPOOL
      - --host-allowlist=*
      - --rpc-http-cors-origins=all
      - --nat-method=DOCKER
      - --metrics-enabled=true
      - --metrics-host=0.0.0.0
      - --metrics-port=9545
      - --sync-min-peers=3

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: besu-prometheus
    restart: unless-stopped
    depends_on:
      - validator1
      - validator2
      - validator3
      - validator4
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.5.2
    container_name: besu-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

  rpc-test:
    image: curlimages/curl:8.12.1
    container_name: besu-rpc-test
    depends_on:
      - validator1
    entrypoint: ["/bin/sh", "-c", "sleep infinity"]

networks:
  besu-net:
    ipam:
      config:
        - subnet: 172.28.0.0/16