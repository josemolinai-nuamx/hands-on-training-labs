apiVersion: v1
kind: Pod
metadata:
  name: test-error-logs-pod
  namespace: falla-test
spec:
  containers:
  - name: error-generator
    image: busybox
    command: 
      - sh
      - -c
      - |
        echo "ERROR: Connection timeout to database" >&2
        echo "WARNING: High memory usage detected" >&2
        echo "ERROR: Failed to authenticate user" >&2
        sleep 2
        echo "CRITICAL: Application crashed" >&2
        exit 1
  restartPolicy: Never