---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-local-config-yaml
  namespace: monitoring
data:
  local-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 5m
      chunk_retain_period: 30s

    schema_config:
      configs:
      - from: 2025-10-01
        # CORRECCIÓN 1: Cambiar el tipo de índice a 'tsdb'
        store: tsdb 
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 168h

    # CORRECCIÓN 2: Ya no se necesita el bloque 'boltdb'
    storage_config:
      # DEBES eliminar o comentar el bloque boltdb, 
      # ya que ahora usas 'tsdb' como almacenamiento para el índice.
      # boltdb:
      #   directory: /tmp/loki/index

      # Debes agregar el bloque 'tsdb'
      tsdb:
        dir: /tmp/loki/index # Usar 'dir' en lugar de 'directory'

      filesystem:
        directory: /tmp/loki/chunks

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
