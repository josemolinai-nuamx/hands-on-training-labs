apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  releaseName: prometheus
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      version: ">=52.1.0"
  timeout: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
  interval: 24h0m0s
  values:
    kubelet:
      enabled: true
      serviceMonitor:
        https: true
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    grafana:
      plugins:
        - grafana-piechart-panel
      persistence:
        enabled: false  # ← Clave: deshabilito la persistencia
        #enabled: true
        #size: 5Gi
        #storageClassName: "managed-csi"
        #accessModes:
        #  - ReadWriteOnce
    prometheusOperator:
      admissionWebhooks:
        enabled: false
      tls:
        enabled: false
    prometheus:
      prometheusSpec:
        podMonitorNamespaceSelector: {}        # Selecciona todos los namespaces
        podMonitorSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        ruleNamespaceSelector: {}              # Selecciona todos los namespaces
        ruleSelector: {}
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}    # Selecciona todos los namespaces
        serviceMonitorSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false