---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kustom-reposources
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./overlays/dev/infrastructure/reposources
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
  wait: true