---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kustom-postgresql
  namespace: flux-system
spec:
  interval: 1m0s
  path: ./devops/flux_repo/overlays/dev/infrastructure/postgresql
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
  wait: true